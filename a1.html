<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A1 Conceptual Architecture | Gemini CLI Project</title>
  <style>
    :root{
      --bg: #0f172a;
      --card: rgba(255,255,255,0.06);
      --text: #e5e7eb;
      --muted: rgba(229,231,235,0.75);
      --border: rgba(255,255,255,0.14);
      --accent: #60a5fa;
      --accent2: #34d399;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, rgba(96,165,250,0.18), transparent 55%),
                  radial-gradient(900px 600px at 95% 10%, rgba(52,211,153,0.12), transparent 55%),
                  var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    header{
      padding: 28px 18px 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .topbar{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .crumbs{
      color: var(--muted);
      font-size: 0.95rem;
    }
    .crumbs a{
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed rgba(255,255,255,0.25);
    }
    .crumbs a:hover{
      color: var(--text);
      border-bottom-color: rgba(255,255,255,0.5);
    }
    h1{
      font-size: 2rem;
      margin: 10px 0 8px;
      letter-spacing: 0.2px;
    }
    p.lead{
      margin: 0;
      color: var(--muted);
      max-width: 70ch;
    }
    main{
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 18px 40px;
    }
    .grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 820px){
      .grid{
        grid-template-columns: 1fr 1fr;
      }
    }
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
    }
    .card h2{
      margin: 0 0 10px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge{
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      white-space: nowrap;
    }
    .badge.accent{
      border-color: rgba(96,165,250,0.5);
      color: rgba(191,219,254,0.95);
      background: rgba(96,165,250,0.10);
    }
    ul{
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }
    li{
      margin: 7px 0;
    }
    a{
      color: rgba(191,219,254,0.95);
      text-decoration: none;
    }
    a:hover{
      text-decoration: underline;
    }
    .small{
      font-size: 0.92rem;
      color: var(--muted);
      margin: 0;
    }
    .full{
      grid-column: 1 / -1;
    }
    footer{
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 18px 30px;
      color: rgba(229,231,235,0.55);
      font-size: 0.9rem;
    }
    .video-wrapper{
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      margin-top: 10px;
    }
    .video-wrapper iframe{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }
    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .btn:hover{
      border-color: rgba(96,165,250,0.55);
      background: rgba(96,165,250,0.10);
      text-decoration: none;
    }
    .pdf-embed{
      width: 100%;
      height: 800px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <header>
    <div class="topbar">
      <div class="crumbs">
        <a href="index.html">Home</a> / <span>A1 Conceptual Architecture</span>
      </div>
      <span class="badge accent">CISC 322 &bull; Winter 2026</span>
    </div>

    <h1>A1 &mdash; Conceptual Architecture</h1>
    <p class="lead"></p>
  </header>

  <main>
    <section class="grid">
      <!-- Presentation Video -->
      <div class="card full">
        <h2>
          Presentation Video
          <span class="badge">recording</span>
        </h2>
        <div class="video-wrapper">
          <iframe
            src="https://www.youtube.com/embed/3Gk5dEgvvjk"
            title="A1 Conceptual Architecture Presentation"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <!-- Report PDF -->
      <div class="card full">
        <h2>
          Written Report
          <span class="badge">PDF</span>
        </h2>
        <p class="small" style="margin-bottom: 6px;">
          The full conceptual architecture report is embedded below. You can also download it directly.
        </p>
        <a class="btn" href="A1ConceptualArchitectureReport.pdf" target="_blank" rel="noopener" style="margin-bottom: 10px;">
          Download PDF
        </a>
        <object
          data="A1ConceptualArchitectureReport.pdf"
          type="application/pdf"
          class="pdf-embed">
          <p class="small" style="margin-top: 14px;">
            Your browser does not support embedded PDFs.
            <a href="A1ConceptualArchitectureReport.pdf" target="_blank" rel="noopener">Click here to download the report.</a>
          </p>
        </object>
      </div>

    </section>
  </main>

  <footer>
    Last updated: <span id="lastUpdated"></span>
  </footer>

  <script>
    const el = document.getElementById("lastUpdated");
    el.textContent = new Date().toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  </script>
</body>
</html>
